name: Build Flutter Android APK with C++

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout kode dari GitHub
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup Java Development Kit (JDK)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    # 3. Setup Android SDK & NDK (Krusial untuk C++)
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK
      run: |
        sdkmanager --install "ndk;25.1.8937393" # Sesuaikan versi NDK jika diperlukan

    # 4. Setup Flutter
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0' # Sesuaikan dengan versi Flutter Anda
        channel: 'stable'

    # 5. Ambil Dependencies Flutter
    - name: Install dependencies
      run: flutter pub get

    # 6. Build APK (Otomatis memicu CMake untuk compile C++)
    - name: Build APK
      run: flutter build apk --release

    # 7. Upload APK sebagai Artifact agar bisa didownload ke HP
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rti-clone-release-apk
        path: build/app/outputs/flutter-apk/app-release-apk
